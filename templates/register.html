<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Pro - Create Account</title>
    <!-- Modern Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* 🌌 Animated Gradient Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #e73c7e, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🧊 Glassmorphism Card */
        .reg-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 40px;
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 10;
        }

        /* 🎨 Title Style */
        .title-text {
            font-family: 'Righteous', cursive;
            font-size: 32px;
            margin: 0 0 5px 0;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1.5px;
        }
        .sub-text {
            color: #e0e0e0;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* 🖋️ Input Fields */
        .input-container {
            position: relative;
            margin-bottom: 20px;
        }

        .input-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 16px;
            opacity: 0.8;
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            outline: none;
            box-sizing: border-box;
            font-size: 15px;
            color: #fff;
            transition: 0.3s;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.7); }

        input:focus {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* 🚀 Action Button */
        button {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #2c3e50;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 800;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background: #f1c40f;
            color: #fff;
        }

        /* 🔗 Links */
        .login-link {
            margin-top: 20px;
            display: block;
            font-size: 14px;
            color: #ecf0f1;
            text-decoration: none;
            font-weight: 400;
        }
        .login-link span {
            color: #fff;
            font-weight: 600;
            text-decoration: underline;
            transition: 0.3s;
        }
        .login-link:hover span { color: #f1c40f; }

        #msg { margin-top:15px; font-size:13px; font-weight:bold; color: #fff; }

        /* ✨ Decorative Floating Circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            z-index: 1;
            animation: float 6s ease-in-out infinite;
        }
        .circle:nth-child(1) { width: 120px; height: 120px; top: 10%; left: 10%; animation-delay: 0s; }
        .circle:nth-child(2) { width: 80px; height: 80px; bottom: 15%; right: 15%; animation-delay: 2s; }
        .circle:nth-child(3) { width: 50px; height: 50px; top: 50%; right: 10%; animation-delay: 4s; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <!-- Floating Background Elements -->
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="reg-card">
        <h1 class="title-text">Join LMS Pro</h1>
        <p class="sub-text">Start your learning journey today!</p>

        <div class="input-container">
            <i class="fas fa-user"></i>
            <input type="text" id="name" placeholder="Full Name" autocomplete="off">
        </div>

        <div class="input-container">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Email Address" autocomplete="off">
        </div>

        <div class="input-container">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Create Password">
        </div>

        <button onclick="handleRegister()"><i class="fas fa-user-plus"></i> Create Account</button>
        <p id="msg"></p>

        <a href="/" class="login-link">Already have an account? <span>Login Here</span></a>
    </div>

    <script>
        async function handleRegister() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            if(!name || !email || !password) {
                msg.innerText = "⚠️ Please fill in all fields.";
                msg.style.color = "#ffcccc";
                return;
            }

            msg.innerText = "⏳ Creating Account...";
            msg.style.color = "#fff";

            try {
                const res = await fetch("/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "name": name,
                        "email": email,
                        "password": password,
                        "role": "student"
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    msg.innerHTML = "✅ Success! Redirecting...";
                    msg.style.color = "#a8ff78";
                    setTimeout(() => { window.location.href = "/"; }, 1500);
                } else {
                    msg.innerText = "❌ " + data.detail;
                    msg.style.color = "#ffcccc";
                }
            } catch (error) {
                msg.innerText = "⚠️ Server Error!";
                msg.style.color = "#ffcccc";
            }
        }
    </script>
</body>
</html>
