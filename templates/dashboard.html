<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Library Dashboard</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #f4f7f6; display: flex; }

        /* 🏰 সাইডবার ডিজাইন */
        .sidebar { width: 260px; background: #2c3e50; color: white; height: 100vh; padding: 25px; position: fixed; box-sizing: border-box; }
        .sidebar h2 { text-align: center; margin-bottom: 40px; font-size: 24px; color: #3498db; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar ul li { padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; }
        .sidebar ul li:hover { background: #34495e; transform: translateX(10px); }
        .sidebar ul li i { margin-right: 15px; font-size: 18px; width: 25px; }
        .active-link { background: #3498db !important; }

        /* 🖥️ মেইন কন্টেন্ট এরিয়া */
        .content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; background: white; padding: 20px 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; font-size: 22px; color: #2c3e50; }

        /* 🔍 সার্চ বার */
        .search-container { position: relative; margin-bottom: 30px; }
        .search-box { width: 100%; max-width: 500px; padding: 15px 20px 15px 50px; border: none; border-radius: 30px; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); outline: none; transition: 0.3s; }
        .search-box:focus { box-shadow: 0 4px 20px rgba(52, 152, 219, 0.3); }
        .search-icon { position: absolute; left: 20px; top: 18px; color: #7f8c8d; font-size: 18px; }

        /* 📚 বইয়ের কার্ড গ্রিড */
        .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .book-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 6px 20px rgba(0,0,0,0.05); transition: 0.3s; border-top: 5px solid #3498db; }
        .book-card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .book-card h3 { margin: 0 0 10px; color: #2c3e50; font-size: 20px; height: 50px; overflow: hidden; }
        .book-card p { color: #7f8c8d; font-size: 14px; margin: 8px 0; }
        .book-card i { color: #3498db; margin-right: 8px; }

        .badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 10px; }
        .badge-available { background: #e8f8f5; color: #27ae60; }
        .badge-out { background: #fdedec; color: #c0392b; }

        /* 🔘 বাটন ডিজাইন */
        .btn-borrow { background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: 600; font-size: 15px; transition: 0.3s; }
        .btn-borrow:hover:not(:disabled) { background: #2980b9; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4); }
        .btn-borrow:disabled { background: #bdc3c7; cursor: not-allowed; }

        .btn-logout { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-logout:hover { background: #c0392b; }

        /* 📱 মোবাইল রেসপন্সিভ */
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px; }
            .sidebar h2, .sidebar span { display: none; }
            .content { margin-left: 70px; width: calc(100% - 70px); }
        }
    </style>
</head>
<body>

    <!-- 🏰 সাইডবার -->
    <div class="sidebar">
        <h2>📚 LMS Pro</h2>
        <ul>
            <li class="active-link" onclick="loadBooks()"><i class="fas fa-book"></i> <span>Library Books</span></li>
            <li onclick="window.location.href='/quiz'"><i class="fas fa-stopwatch"></i> <span>Take Quiz</span></li>
            <li onclick="window.location.href='/profile'"><i class="fas fa-user-circle"></i> <span>My Profile</span></li>
            <!-- 🛡️ এই বাটনটি শুধুমাত্র অ্যাডমিন দেখতে পাবে -->
            <li id="admin-link" style="display: none;" onclick="window.location.href='/admin'"><i class="fas fa-user-shield"></i> <span>Admin Panel</span></li>
            <li onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></li>
        </ul>
    </div>

    <!-- 🖥️ মেইন কন্টেন্ট -->
    <div class="content">
        <div class="header">
            <h1 id="welcome-msg">Welcome, User!</h1>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-power-off"></i> Logout</button>
        </div>

        <!-- 🔍 সার্চ বার -->
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-box" placeholder="Search by Book Title, Author or Category..." onkeyup="searchBooks()">
        </div>

        <h2 style="color:#2c3e50; margin-bottom: 25px;">📖 Explore Library</h2>

        <!-- 📚 বইয়ের গ্রিড -->
        <div class="card-container" id="book-list">
            <!-- জাভাস্ক্রিপ্ট দিয়ে এখানে বই লোড হবে -->
            <p>Loading books from database...</p>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");

        // টোকেন না থাকলে লগিন পেজে পাঠিয়ে দিবে
        if (!token) {
            window.location.href = "/";
        }

        // ১. ইউজারের তথ্য ও রোল চেক করা
        async function loadProfile() {
            try {
                const res = await fetch("/users/me", {
                    headers: { "Authorization": "Bearer " + token }
                });
                const data = await res.json();

                if (res.ok) {
                    // নাম দেখানো (ইমেইল থেকে @ এর আগের অংশ)
                    document.getElementById("welcome-msg").innerHTML = `Hi, <span style="color:#3498db;">${data.email.split('@')[0]}</span>! Welcome back.`;

                    // 🛡️ রোল চেক: যদি অ্যাডমিন হয়, তবে বাটন দেখাও
                    if (data.role === "admin") {
                        document.getElementById("admin-link").style.display = "flex";
                    }
                } else {
                    logout(); // টোকেন সমস্যা থাকলে লগআউট
                }
            } catch (error) {
                console.error("Profile Error:", error);
            }
        }

        // ২. বই লোড করা ও সার্চ ফাংশন
        async function loadBooks(query = "") {
            try {
                let url = "/books";
                if (query) url += "?search=" + encodeURIComponent(query);

                const res = await fetch(url);
                const books = await res.json();
                const container = document.getElementById("book-list");

                container.innerHTML = "";

                if (books.length === 0) {
                    container.innerHTML = "<div style='text-align:center; grid-column: 1/-1; padding: 50px;'><i class='fas fa-search-minus' style='font-size:40px; color:#bdc3c7;'></i><p>No books found matching your search.</p></div>";
                    return;
                }

                books.forEach(book => {
                    const isAvailable = book.available_copies > 0;
                    const html = `
                        <div class="book-card">
                            <h3>${book.title}</h3>
                            <p><i class="fas fa-pen-nib"></i> ${book.author}</p>
                            <p><i class="fas fa-tags"></i> ${book.category}</p>
                            <p><i class="fas fa-hashtag"></i> ISBN: ${book.isbn}</p>
                            <span class="badge ${isAvailable ? 'badge-available' : 'badge-out'}">
                                ${isAvailable ? 'Available: ' + book.available_copies : 'Out of Stock'}
                            </span>
                            <button class="btn-borrow"
                                    onclick="borrowBook('${book.isbn}')"
                                    ${!isAvailable ? 'disabled' : ''}>
                                ${isAvailable ? '<i class="fas fa-hand-holding"></i> Borrow Now' : 'Not Available'}
                            </button>
                        </div>
                    `;
                    container.innerHTML += html;
                });
            } catch (error) {
                console.error("Load Books Error:", error);
            }
        }

        // ৩. সার্চ টাইপিং হ্যান্ডলার
        function searchBooks() {
            const query = document.getElementById("searchInput").value;
            loadBooks(query);
        }

        // ৪. বই ধার নেওয়ার ফাংশন
        async function borrowBook(isbn) {
            // ইউজারের কাছে জানতে চাইবে কত দিনের জন্য নিবে
            let days = prompt("কত দিনের জন্য বইটি নিতে চাও? (যেমন: 3, 7, 10 দিন)", "7");

            if (days === null || days.trim() === "") return; // Cancel করলে বন্ধ হবে

            days = parseInt(days);
            if (isNaN(days) || days <= 0) {
                alert("দয়া করে সঠিক দিন লিখুন!");
                return;
            }

            try {
                // লিংকের সাথে days প্যারামিটার পাঠানো হচ্ছে
                const res = await fetch(`/books/borrow/${isbn}?days=${days}`, {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + token }
                });

                const data = await res.json();
                if (res.ok) {
                    alert("✅ " + data.message);
                    loadBooks(); // রিফ্রেশ করে কপি আপডেট করা
                } else {
                    alert("❌ Error: " + data.detail);
                }
            } catch (error) {
                alert("Server Connection Error!");
            }
        }
        // ৫. লগআউট ফাংশন
        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/";
        }

        // পেজ লোড হওয়ার সময় রান হবে
        loadProfile();
        loadBooks();
    </script>
</body>
</html>
