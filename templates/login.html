<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Library Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify_content: center; align-items: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2); width: 350px; text-align: center;
        }
        input {
            width: 100%; padding: 10px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 5px; outline: none;
        }
        button {
            width: 100%; padding: 12px; background: linear-gradient(to right, #667eea, #764ba2);
            color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>📚 Library Login</h2>
        <input type="email" id="email" placeholder="student@example.com">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <p id="msg" style="margin-top:15px; font-size:12px; color:#666;"></p>
        <!-- এই লাইনটি যোগ করো -->
<p style="margin-top: 15px; font-size: 14px;">
    Don't have an account? <a href="/register-page" style="color: #667eea; text-decoration: none; font-weight: bold;">Register Here</a>
</p>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            msg.innerText = "Checking...";

            const formData = new URLSearchParams();;
            formData.append("username", email);
            formData.append("password", password);

            try {
                const response = await fetch("/login", { method: "POST", body: formData });
                const data = await response.json();

                if (response.ok) {
                    msg.innerText = "Success! Redirecting...";
                    msg.style.color = "green";
                    localStorage.setItem("token", data.access_token);
                    setTimeout(() => { window.location.href = "/dashboard"; }, 500);
                } else {
                    msg.innerText = "Error: " + data.detail;
                    msg.style.color = "red";
                }
            } catch (error) {
                msg.innerText = "Server Error!";
            }
        }
    </script>
</body>
</html>
