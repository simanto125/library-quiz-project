<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #2c3e50; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 10px; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; font-weight: bold; color: #7f8c8d; }
        .tab.active { color: #3498db; border-bottom: 3px solid #3498db; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        textarea { width: 100%; height: 80px; margin-top: 10px; font-family: monospace; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;}
        .btn-action { background: #27ae60; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; font-weight: bold; width: 100%;}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #34495e; color: white; }
        .back-btn { display: inline-block; margin-bottom: 20px; font-weight: bold; text-decoration: none; color: #3498db; }
        .btn-delete { background: #c0392b; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold;}

        .safe { color: green; font-weight: bold; }
        .overdue { color: darkred; font-weight: bold; }
        .red-alert { color: red; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <a href="/dashboard" class="back-btn">⬅ Back to Dashboard</a>
    <h1>🛠️ Admin Control Panel</h1>

    <div class="tabs">
        <div class="tab active" onclick="showTab('booksTab', this)">Manage Books</div>
        <div class="tab" onclick="showTab('quizTab', this)">Manage Quizzes</div>
        <div class="tab" onclick="showTab('issuedTab', this)">Issued Books (Track)</div>
    </div>

    <!-- 📚 Manage Books Tab -->
    <div id="booksTab" class="tab-content active">
        <div style="background: #ecf0f1; padding: 15px; border-radius: 8px;">
            <h3>📤 Bulk Add Books (JSON)</h3>
            <textarea id="bookJson" placeholder='[{"title":"Book","author":"Author","isbn":"123","category":"Novel","total_copies":5,"available_copies":5}]'></textarea>
            <button class="btn-action" onclick="bulkAddBooks()">Upload Books</button>
        </div>
        <table>
            <thead><tr><th>Title</th><th>ISBN</th><th>Category</th><th>Action</th></tr></thead>
            <tbody id="bookList"></tbody>
        </table>
    </div>

    <!-- 🎯 Manage Quiz Tab -->
    <div id="quizTab" class="tab-content">
        <div style="background: #ecf0f1; padding: 15px; border-radius: 8px;">
            <h3>📤 Bulk Add Questions (JSON)</h3>
            <textarea id="quizJson" placeholder='[{"question_text":"Q?","options":["A","B"],"correct_answer":"A","category":"General"}]'></textarea>
            <button class="btn-action" onclick="bulkAddQuiz()">Upload Questions</button>
        </div>
        <table>
            <thead><tr><th>Question</th><th>Category</th><th>Action</th></tr></thead>
            <tbody id="quizList"></tbody>
        </table>
    </div>

    <!-- 🚨 Track Students -->
    <div id="issuedTab" class="tab-content">
        <h2>📚 Books Borrowed by Students (<span id="issueCount">0</span>)</h2>
        <table>
            <thead>
                <tr><th>Student Email</th><th>Book Title</th><th>Issue Date</th><th>Return Date</th><th>Status / Alert</th></tr>
            </thead>
            <tbody id="issuedList"></tbody>
        </table>
    </div>
</div>

<script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/";

    async function checkAdmin() {
        try {
            const res = await fetch("/users/me", { headers: { "Authorization": "Bearer " + token }});
            const data = await res.json();
            if (data.role !== "admin") {
                window.location.href = "/dashboard";
            } else {
                loadBooks(); loadQuiz(); loadIssuedBooks();
            }
        } catch(e) { window.location.href = "/"; }
    }

    function showTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active'); el.classList.add('active');
    }

    // --- 📚 Book Logic (FIXED DELETE) ---
    async function loadBooks() {
        const res = await fetch("/books");
        const data = await res.json();
        document.getElementById("bookList").innerHTML = data.map(b => `
            <tr>
                <td>${b.title}</td>
                <td><b>${b.isbn}</b></td>
                <td>${b.category}</td>
                <td><button class="btn-delete" onclick="deleteBook('${b.isbn}')">Delete</button></td>
            </tr>
        `).join('');
    }

    async function bulkAddBooks() {
        try {
            await fetch("/books/bulk-add", {
                method: "POST",
                headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
                body: document.getElementById("bookJson").value
            });
            alert("Books Added Successfully!");
            loadBooks();
            document.getElementById("bookJson").value = "";
        } catch(e) { alert("Invalid JSON format!"); }
    }

    async function deleteBook(isbn) {
        if (!confirm(`Delete book with ISBN: ${isbn}?`)) return;

        try {
            const res = await fetch(`/books/delete/${encodeURIComponent(isbn.trim())}`, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });

            if (res.ok) {
                alert("Book Deleted!");
                loadBooks();
            } else {
                const err = await res.json();
                alert("Error: " + err.detail);
            }
        } catch (error) { alert("Server Error!"); }
    }

    // --- 🎯 Quiz Logic ---
    async function loadQuiz() {
        const res = await fetch("/quiz/all");
        const data = await res.json();
        document.getElementById("quizList").innerHTML = data.map(q => `
            <tr>
                <td>${q.question_text}</td>
                <td>${q.category}</td>
                <td><button class="btn-delete" onclick="deleteQuiz('${q._id}')">Delete</button></td>
            </tr>
        `).join('');
    }

    async function bulkAddQuiz() {
        try {
            await fetch("/quiz/bulk-add", {
                method: "POST",
                headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
                body: document.getElementById("quizJson").value
            });
            alert("Questions Added!");
            loadQuiz();
            document.getElementById("quizJson").value = "";
        } catch(e) { alert("Invalid JSON format!"); }
    }

    async function deleteQuiz(id) {
        if(!confirm("Delete this question?")) return;
        await fetch("/quiz/delete/" + id, { method: "DELETE", headers: { "Authorization": "Bearer " + token }});
        loadQuiz();
    }

    // --- 🚨 Issued Books Track ---
    async function loadIssuedBooks() {
        const res = await fetch("/admin/issued-books", { headers: { "Authorization": "Bearer " + token }});
        const data = await res.json();
        document.getElementById("issueCount").innerText = data.length;
        document.getElementById("issuedList").innerHTML = "";

        let today = new Date(); today.setHours(0,0,0,0);

        data.forEach(record => {
            let returnDate = new Date(record.return_date + "T00:00:00");
            let diffDays = Math.round((returnDate.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));

            let statusHtml = `<span class='safe'>Safe (${diffDays} days left)</span>`;
            if (diffDays === 1 || diffDays === 0) statusHtml = `<span class='red-alert'>🔴 1 Day Left</span>`;
            else if (diffDays < 0) statusHtml = `<span class='overdue'>❌ Overdue</span>`;

            document.getElementById("issuedList").innerHTML += `<tr><td><b>${record.user_email}</b></td><td>${record.book_title}</td><td>${record.issue_date}</td><td><b>${record.return_date}</b></td><td>${statusHtml}</td></tr>`;
        });
    }

    checkAdmin();
</script>
</body>
</html>
